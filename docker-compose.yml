services:
  # Still in development
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - GO_ENV=development
    volumes:
      - ./backend:/workspace/backend:cached
      - gomodcache:/go/pkg/mod
      - gobuildcache:/root/.cache/go-build
    networks:
      - smart-todo
    working_dir: /workspace/backend
    command: air

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    working_dir: /app/frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./frontend/node_modules:/app/frontend/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host
    networks:
      - smart-todo

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - ./data/mongo:/data/db
    networks:
      - smart-todo

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - smart-todo

networks:
  smart-todo:
    driver: bridge

volumes:
  gomodcache:
  gobuildcache:
  redis_data:
